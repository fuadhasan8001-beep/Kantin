<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Saya</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui, Arial, sans-serif;
}

body{
background:#0f172a;
color:#e5e7eb;
min-height:100vh;
}

/* Navbar */
.nav{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 20px;
background:#020617;
position:sticky;
top:0;
border-bottom:1px solid #1f2933;
}

.brand{
font-weight:700;
letter-spacing:.3px;
}

.menu{
display:flex;
gap:16px;
list-style:none;
}

.menu a{
color:#e5e7eb;
text-decoration:none;
opacity:.9;
}

.menu a:hover{
opacity:1;
text-decoration:underline;
}

.burger{
display:none;
cursor:pointer;
}

.burger span{
display:block;
width:24px;
height:2px;
background:#e5e7eb;
margin:5px 0;
transition:.2s;
}

/* Profile */
.container{
max-width:960px;
margin:40px auto;
padding:0 16px;
}

.card{
background:#020617;
border:1px solid #1f2933;
border-radius:14px;
padding:24px;
display:grid;
grid-template-columns:120px 1fr;
gap:20px;
}

/* Foto Profil */
.avatar{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:2px solid #1f2933;
}

/* Text */
.name{
font-size:1.4rem;
font-weight:700;
}

.bio{
opacity:.9;
margin:6px 0 12px;
}

.chips{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.chip{
border:1px solid #1f2933;
padding:6px 10px;
border-radius:999px;
font-size:.85rem;
}

/* Responsive */
@media (max-width:640px){

.menu{
position:absolute;
right:20px;
top:58px;
background:#020617;
border:1px solid #1f2933;
border-radius:10px;
padding:10px;
flex-direction:column;
display:none;
width:160px;
}

.menu.active{
display:flex;
}

.burger{
display:block;
}

.card{
grid-template-columns:1fr;
text-align:center;
}

.avatar{
margin:0 auto;
}

}

</style>
</head>

<body>

<nav class="nav">
<div class="brand">Profil</div>

<ul class="menu" id="menu">
<li><a href="#home">Home</a></li>
<li><a href="#about">About</a></li>
<li><a href="Beranda.html">Projects Canteen</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

<div class="burger" id="burger">
<span></span>
<span></span>
<span></span>
</div>

</nav>

<main class="container" id="home">

<section class="card">

<!-- Foto Profil -->
<img src="pp.jpg" class="avatar">

<div>
<div class="name">Fuad Hasan</div>

<p class="bio">Masih pemula.</p>

<div class="chips">
<span class="chip">OBS Studio</span>
<span class="chip">VMIX</span>
<span class="chip">Resolume Arena</span>
<span class="chip">Sound Engineer</span>
<span class="chip">GitHub Pages</span>
<span class="chip">HTML dasar</span>
</div>

</div>
</section>

</main>

<script>

const burger=document.getElementById("burger");
const menu=document.getElementById("menu");

burger.addEventListener("click",function(){
menu.classList.toggle("active");
});

</script>

</body>
</html>
